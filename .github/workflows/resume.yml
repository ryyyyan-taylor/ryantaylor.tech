name: Regen Resume PDF

on:
  push:
    branches: [master]
    paths:
      - resume.json

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install resumed and theme
        run: npm install -g resumed jsonresume-theme-even

      - name: Export resume to HTML
        run: resumed render resume.json --theme jsonresume-theme-even --output resume.html

      - name: Convert HTML to PDF
        run: |
          google-chrome-stable --headless --no-sandbox \
            --print-to-pdf="${GITHUB_WORKSPACE}/assets/Ryan_Taylor_resume.pdf" \
            --no-pdf-header-footer \
            "file://${GITHUB_WORKSPACE}/resume.html"

      - name: Commit PDF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/Ryan_Taylor_resume.pdf
          if git diff --cached --quiet; then
            echo "PDF unchanged, skipping commit"
          else
            git commit -m "[skip ci] regen resume PDF"
            git push
          fi
