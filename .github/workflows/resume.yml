name: Regen Resume PDF

on:
  push:
    branches: [master]
    paths:
      - resume.tex

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: resume.tex

      - name: Move PDF to assets
        run: mv resume.pdf assets/Ryan_Taylor_resume.pdf

      - name: Commit PDF if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/Ryan_Taylor_resume.pdf
          if git diff --cached --quiet; then
            echo "PDF unchanged, skipping commit"
          else
            git commit -m "[skip ci] regen resume PDF"
            git push
          fi
